<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Informe de Inversión · Legion Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink:#16182b; --ink2:#3b3f5c; --muted:#6b7088; --line:#e6e8f0; --line2:#d2d6e4;
    --paper:#ffffff; --soft:#f6f7fb; --accent:#4f46e5; --accent-soft:#eef0fe;
    --green:#15803d; --green-bg:#e9f7ef; --amber:#b45309; --amber-bg:#fdf3e3; --red:#b91c1c; --red-bg:#fce9e9;
  }
  body { font-family:'Inter',sans-serif; background:#eceef4; color:var(--ink); line-height:1.5; padding:24px 12px; }

  .toolbar { max-width:820px; margin:0 auto 16px; display:flex; justify-content:flex-end; gap:8px; }
  .btn { font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; padding:9px 16px; border-radius:8px; border:1px solid var(--line2); background:#fff; color:var(--ink2); cursor:pointer; text-decoration:none; display:inline-block; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn:hover { border-color:var(--accent); }

  .page { max-width:820px; margin:0 auto; background:var(--paper); border-radius:6px; box-shadow:0 10px 40px rgba(20,24,45,0.12); padding:48px 52px; }

  /* HEAD */
  .doc-head { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--ink); padding-bottom:18px; margin-bottom:26px; }
  .brand-name { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; letter-spacing:0.04em; }
  .brand-sub { font-size:12px; color:var(--muted); letter-spacing:0.16em; text-transform:uppercase; margin-top:2px; }
  .doc-meta { text-align:right; font-size:12px; color:var(--muted); line-height:1.7; }
  .doc-meta b { color:var(--ink2); }

  h1.doc-title { font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; margin-bottom:6px; }
  .doc-intro { font-size:13.5px; color:var(--ink2); margin-bottom:26px; max-width:620px; }

  /* VERDICT */
  .verdict { border-radius:10px; padding:22px 24px; margin-bottom:28px; border:1px solid; }
  .verdict.ok { background:var(--green-bg); border-color:#bfe3cd; }
  .verdict.warn { background:var(--amber-bg); border-color:#f1ddb8; }
  .verdict.bad { background:var(--red-bg); border-color:#f2c7c7; }
  .v-tag { font-family:'Space Grotesk',sans-serif; font-size:10.5px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .v-title { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; line-height:1.2; margin-bottom:6px; }
  .verdict.ok .v-title { color:var(--green); } .verdict.warn .v-title { color:var(--amber); } .verdict.bad .v-title { color:var(--red); }
  .v-msg { font-size:13px; color:var(--ink2); max-width:660px; }

  /* KPI ROW */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:28px; }
  .kpi { background:var(--paper); padding:16px 18px; }
  .kpi .l { font-family:'Space Grotesk',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .kpi .v { font-family:'Space Grotesk',sans-serif; font-size:21px; font-weight:700; }
  .kpi.accent .v { color:var(--accent); }
  .kpi.green .v { color:var(--green); }
  .kpi.red .v { color:var(--red); }

  h2.sec { font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.02em; margin:30px 0 14px; padding-bottom:8px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; }

  /* CATEGORY BARS */
  .bar-row { display:grid; grid-template-columns:170px 1fr 96px; gap:12px; align-items:center; margin-bottom:9px; font-size:13px; }
  .bar-name { color:var(--ink2); font-weight:500; }
  .bar-track { height:14px; background:var(--soft); border-radius:7px; overflow:hidden; border:1px solid var(--line); }
  .bar-fill { height:100%; border-radius:7px; }
  .bar-amt { text-align:right; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; }
  .bar-pct { color:var(--muted); font-weight:400; font-size:11px; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  thead th { text-align:left; font-family:'Space Grotesk',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); padding:8px 10px; border-bottom:2px solid var(--line2); }
  th.num, td.num { text-align:right; font-family:'Space Grotesk',sans-serif; }
  td { padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  .cat-row td { background:var(--soft); font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; color:var(--ink); }
  .it-name { color:var(--ink); font-weight:500; }
  .it-note { color:var(--muted); font-size:10.5px; margin-top:2px; }
  .pill { font-size:9.5px; font-weight:700; font-family:'Space Grotesk',sans-serif; padding:2px 7px; border-radius:10px; white-space:nowrap; }
  .pill.paid { color:var(--green); background:var(--green-bg); } .pill.pend { color:var(--amber); background:var(--amber-bg); }
  .iva-mini { font-size:9.5px; color:var(--muted); }
  tfoot td { padding:12px 10px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; border-top:2px solid var(--ink); }

  .note-list { font-size:12px; color:var(--ink2); line-height:1.7; padding-left:18px; }
  .note-list li { margin-bottom:4px; }

  .doc-foot { margin-top:32px; padding-top:14px; border-top:1px solid var(--line); font-size:10.5px; color:var(--muted); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }

  @media (max-width:680px){
    .page{ padding:28px 22px; } .kpi-row{ grid-template-columns:repeat(2,1fr);} .bar-row{ grid-template-columns:120px 1fr 80px; }
    .doc-head{ flex-direction:column; gap:10px; } .doc-meta{ text-align:left; }
  }

  @media print {
    body { background:#fff; padding:0; }
    .toolbar { display:none; }
    .page { box-shadow:none; border-radius:0; max-width:none; padding:0; }
    h2.sec, .verdict, .kpi-row, table, .bar-row { page-break-inside:avoid; }
    @page { size:A4; margin:16mm 14mm; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a class="btn" href="resumen.html">← Panel interactivo</a>
  <button class="btn primary" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
</div>

<div class="page" id="page"></div>

<script>
const CATEGORIES = [
  { key:'obra', label:'Obra / albañilería', color:'#ea580c' },
  { key:'electrica', label:'Electricidad', color:'#d97706' },
  { key:'incendios', label:'Contraincendios', color:'#dc2626' },
  { key:'fontaneria', label:'Fontanería / agua', color:'#2563eb' },
  { key:'clima', label:'Climatización / aire', color:'#0891b2' },
  { key:'suelo', label:'Suelo / pavimento', color:'#a16207' },
  { key:'pintura', label:'Pintura', color:'#db2777' },
  { key:'vestuarios', label:'Vestuarios / baños', color:'#0d9488' },
  { key:'maquinaria', label:'Maquinaria / pesas', color:'#4f46e5' },
  { key:'mobiliario', label:'Mobiliario / recepción', color:'#7c3aed' },
  { key:'rotulos', label:'Rótulos / imagen', color:'#c026d3' },
  { key:'acceso', label:'Control de acceso', color:'#16a34a' },
  { key:'licencias', label:'Licencias / proyecto', color:'#475569' },
  { key:'transporte', label:'Transporte / aduana', color:'#0ea5e9' },
  { key:'otros', label:'Otros', color:'#64748b' },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c=>[c.key,c]));

function seedItems(){
  const mk=(sk,concepto,categoria,base,currency,iva,estado,nota)=>({sk,concepto,categoria,base,currency,iva,estado,nota:nota||''});
  return [
    mk('maq-pagado','Maquinaria HSE (76.750 $ FOB) — pagado','maquinaria',55082.18,'EUR',21,'paid','66.649,44 € en 2 transferencias'),
    mk('maq-pend','Maquinaria HSE — IVA importación / pendiente','maquinaria',18788,'EUR', 0,'pending','Al despacho de aduana'),
    mk('elec-gimnas-pagado','Instalación eléctrica gimnasio (Patrick) — pagado a cuenta','electrica',19460.21,'EUR',21,'paid','23.546,85 € pagados por banco (incl. iluminación julio)'),
    mk('elec-gimnas-pend','Instalación eléctrica gimnasio (Patrick) — pendiente','electrica',15154.91,'EUR',21,'pending'),
    mk('elec-incendi','Detección de incendios (central + 37 detectores)','incendios',9611.46,'EUR',21,'pending'),
    mk('elec-comptadors','Suministro caja de contadores','electrica',2252.90,'EUR',21,'pending'),
    mk('obramat-pagado','Material baños/vestuarios/suelo/iluminación (Obramat) — pagado','vestuarios',1769.78,'EUR',21,'paid','2.141,43 € pagados por banco (01/07, luces Obramat vía Terrassa)'),
    mk('obramat-201','Material baños/vestuarios/suelo/iluminación (Obramat) — pendiente','vestuarios',9829.26,'EUR',21,'pending'),
    mk('rotol-legion','Rótulo LEGION letras corpóreas + LED','rotulos',3719.01,'EUR',21,'pending'),
    mk('rotol-xixo','Lonas / decoración La Xixo','rotulos',388.10,'EUR',21,'pending','A nombre de La Xixo — confirmar'),
    mk('carulla-pagado','Carulla (clima+agua+ACS+RITE) — pagado 25%','clima',23600.51,'EUR',21,'paid','Incluye climatización, agua, ACS y RITE. 25% = 28.556,62 € pagado'),
    mk('carulla-pend-iva','Carulla (clima+agua+ACS+RITE) — pendiente 35% (con IVA)','clima',33040.72,'EUR',21,'pending','Con IVA. Climatización, agua, ACS y RITE'),
    mk('carulla-pend-siniva','Carulla (clima+agua+ACS+RITE) — pendiente 40%','clima',37760.82,'EUR',0,'pending','Climatización, agua, ACS y RITE'),
    mk('taquillas-bellum-pagado','Taquillas + cabinas sanitarias (Bellum Logistics) — pagado','vestuarios',7840.75,'EUR',21,'paid','9.487,31 € pagados por banco (13/07)'),
    mk('taquillas-bellum','Taquillas + cabinas sanitarias (Bellum Logistics) — pendiente','vestuarios',7840.75,'EUR',21,'pending'),
    mk('pulir-suelo','Suelo (pavimento gimnasio)','suelo',17000,'EUR',21,'pending','Presupuesto'),
    mk('pintura-gral','Pintura (paredes + fachada)','pintura',5000,'EUR',21,'pending','El suelo va acabado, no se pinta'),
    mk('tornos','Tornos de acceso','acceso',9000,'EUR',21,'pending','Presupuesto'),
    mk('puerta-qr','Puerta de cristal exterior con lector QR','acceso',2819.83,'EUR',21,'pending','3.412 € IVA incl. — presupuesto real'),
    mk('accesibilidad','Elevador para minusválidos','obra',9504.13,'EUR',21,'pending','11.500 € IVA incl. — presupuesto real'),
    mk('lm-vestuarios-extra','Luis Miguel — vestuarios (partida adicional, no incluida en tabiques+techo)','obra',4545.45,'EUR',21,'paid','5.500 € pagados por banco (03/07). Partida distinta de la de tabiques+techo.'),
    mk('lm-pendiente','Luis Miguel (tabiques + techo vestuarios)','obra',16097.78,'EUR',21,'pending','Presupuesto (sin IVA +21%): refuerzos pino 440 + tabique sala poses 2.135 + entrada recepción 1.895,13 + ocultación agua/luz 3.104,11 + techo vestuarios 8.523,54'),
    mk('espejos','Espejos sala (pared entrenamiento)','obra',4381.82,'EUR',21,'pending','5.302 € IVA incl. — presupuesto real'),
    mk('transporte','Transporte marítimo + aduana equipos','transporte',10800,'EUR',0,'pending','Estimación ≈ 30.000 €'),
    mk('extra-obra','Obra y mano de obra ya ejecutada (Rubiralta y otros)','obra',37580.20,'EUR',21,'paid','Ya pagado (banco)'),
    mk('extra-otros','Residuos, alquileres, web, software, fianza local','otros',15342.16,'EUR',21,'paid','Ya pagado (banco), incl. Josep Selga (adeudo recurrente)'),
    mk('extra-incendios','Ignifugación estructura R-90 (CAT FOC)','incendios',5450.00,'EUR',21,'paid','Ya pagado (banco)'),
    mk('extra-fontaneria','Agua y contador de obra (varios)','fontaneria',1917.36,'EUR',21,'paid','Ya pagado (banco)'),
    mk('extra-transporte','Transporte de materiales (Larriba)','transporte',1185.12,'EUR',21,'paid','Ya pagado (banco)'),
    mk('extra-electrica','Acometida eléctrica (EDistribución)','electrica',1650.60,'EUR',21,'paid','Ya pagado (banco)'),
    mk('extra-impuestos','Impuestos y comisiones bancarias','otros',1065.67,'EUR',0,'paid','Tributos y gastos de banco'),
    mk('techo-rf','Techo RF120: placa RF + lana de roca (56 m, sellado)','incendios',4000,'EUR',21,'pending','4.000 € + 21% IVA (base) — lo ejecuta el promotor (material)'),
    mk('zonas-protegidas','Sobrepresión escalera + pasillo protegido (humos) + cambio techo','incendios',9000,'EUR',21,'pending','ESTIMACIÓN — sistema de presurización diferencial (ventilador+cuadro control+conductos) + cambio de techo. Pendiente de presupuesto real.'),
    mk('valla','Valla perimetral','obra',3000,'EUR',21,'pending','3.000 € + 21% IVA (base)'),
  ];
}

let usdRate=0.92, items=[], budget=0;
const APORTADO=290000, POR_APORTAR=0;
function loadData(){
  try { const raw=localStorage.getItem('gym_reforma_v2');
    if(raw){ const r=JSON.parse(raw);
      if(typeof r.usdRate==='number'&&r.usdRate) usdRate=r.usdRate;
      if(typeof r.budget==='number') budget=r.budget;
      items=Array.isArray(r.items)?r.items:[];
    }
  } catch(e){}
  if(!items.length) items=seedItems();
  if(!budget) budget=APORTADO+POR_APORTAR;
}
const f=n=>Math.round(n).toLocaleString('es-ES')+' €';
const baseEUR=i=>(i.currency==='USD'?(i.base||0)*usdRate:(i.base||0));
const ivaEUR=i=>baseEUR(i)*(i.iva||0)/100;
const totEUR=i=>baseEUR(i)*(1+(i.iva||0)/100);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function today(){ const d=new Date(); return d.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}); }

function render(){
  let totBase=0,totIva=0,totTotal=0,totPaid=0,totPend=0;
  items.forEach(i=>{ totBase+=baseEUR(i); totIva+=ivaEUR(i); totTotal+=totEUR(i); if(i.estado==='paid')totPaid+=totEUR(i); else totPend+=totEUR(i); });

  const byCat={}; items.forEach(i=>{ byCat[i.categoria]=(byCat[i.categoria]||0)+totEUR(i); });
  const usedCats=CATEGORIES.filter(c=>byCat[c.key]>0).sort((a,b)=>byCat[b.key]-byCat[a.key]);
  const maxCat=Math.max(1,...usedCats.map(c=>byCat[c.key]));

  const margen=budget-totTotal;
  const needCap=margen<0;
  let vc,vt,vm;
  if(needCap){ vc='bad'; vt=`Faltan ${f(Math.abs(margen))} por captar de inversores`; vm=`Los fundadores han aportado ${f(APORTADO)} y no van a aportar más. El proyecto cuesta ${f(totTotal)}, por lo que faltan ${f(Math.abs(margen))} que deben venir de socios nuevos.`; }
  else { vc='ok'; vt=`Proyecto cubierto`; vm=`Lo aportado por los fundadores (${f(APORTADO)}) cubre el coste total estimado.`; }

  const estimadas=items.filter(i=>/ESTIMACI/i.test(i.nota||'')&&baseEUR(i)>0);
  const totEst=estimadas.reduce((s,i)=>s+totEUR(i),0);

  const bars=usedCats.map(c=>`
    <div class="bar-row">
      <div class="bar-name">${c.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${byCat[c.key]/maxCat*100}%;background:${c.color}"></div></div>
      <div class="bar-amt">${f(byCat[c.key])} <span class="bar-pct">${Math.round(byCat[c.key]/totTotal*100)}%</span></div>
    </div>`).join('');

  const rows=usedCats.map(c=>{
    const its=items.filter(i=>i.categoria===c.key).sort((a,b)=>totEUR(b)-totEUR(a));
    const sub=its.reduce((s,i)=>s+totEUR(i),0);
    const body=its.map(i=>{
      const ivaP=i.iva||0;
      const ivaTxt = ivaP===0?'sin IVA':(ivaP===21?'21%':String(ivaP).replace('.',',')+'%');
      const note=i.nota?`<div class="it-note">${esc(i.nota)}</div>`:'';
      const st=i.estado==='paid'?'<span class="pill paid">Pagado</span>':'<span class="pill pend">Pendiente</span>';
      return `<tr>
        <td><div class="it-name">${esc(i.concepto)}</div>${note}</td>
        <td class="num">${f(baseEUR(i))}</td>
        <td class="num">${f(ivaEUR(i))}<div class="iva-mini">${ivaTxt}</div></td>
        <td class="num">${f(totEUR(i))}</td>
        <td>${st}</td>
      </tr>`;
    }).join('');
    return `<tr class="cat-row"><td>${c.label}</td><td class="num"></td><td class="num"></td><td class="num">${f(sub)}</td><td></td></tr>${body}`;
  }).join('');

  let notes='';
  const special=items.filter(i=>(i.iva||0)!==21 && baseEUR(i)>0);
  if(special.length) notes+=`<li><b>IVA reducido / sin IVA:</b> ${special.map(i=>`${esc(i.concepto)} (${(i.iva||0)===0?'sin IVA':String(i.iva).replace('.',',')+'%'})`).join('; ')}.</li>`;
  if(estimadas.length) notes+=`<li><b>Estimaciones prudentes</b> (pendientes de presupuesto en firme), por valor de ${f(totEst)}: ${estimadas.map(i=>esc(i.concepto)).join('; ')}.</li>`;
  notes+=`<li>El IVA de una S.L. es, con carácter general, recuperable; no obstante, el desembolso de tesorería se produce en el momento del pago.</li>`;

  document.getElementById('page').innerHTML=`
    <div class="doc-head">
      <div><div class="brand-name">LEGION CLUB</div><div class="brand-sub">Caro Legión S.L.</div></div>
      <div class="doc-meta"><b>Informe de inversión — Reforma</b><br/>Confidencial · para socios<br/>Fecha: ${today()}</div>
    </div>

    <h1 class="doc-title">Estado de la inversión</h1>
    <p class="doc-intro">Resumen económico de la reforma del gimnasio: situación de la inversión, necesidad o no de ampliar capital y desglose de todas las partidas con su base, IVA e importe total.</p>

    <div class="verdict ${vc}">
      <div class="v-tag">¿Se necesita capital adicional?</div>
      <div class="v-title">${vt}</div>
      <div class="v-msg">${vm}</div>
    </div>

    <div class="kpi-row">
      <div class="kpi accent"><div class="l">Coste total (con IVA)</div><div class="v">${f(totTotal)}</div></div>
      <div class="kpi"><div class="l">Aportado fundadores</div><div class="v">${f(APORTADO)}</div></div>
      <div class="kpi"><div class="l">Pendiente de pago</div><div class="v">${f(totPend)}</div></div>
      <div class="kpi ${needCap?'red':'green'}"><div class="l">${needCap?'Falta por captar (inversores)':'Margen'}</div><div class="v">${f(Math.abs(margen))}</div></div>
    </div>

    <h2 class="sec">Distribución del gasto por capítulo</h2>
    ${bars}

    <h2 class="sec">Desglose de partidas</h2>
    <table>
      <thead><tr><th>Concepto</th><th class="num">Base</th><th class="num">IVA</th><th class="num">Total</th><th>Estado</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td>TOTAL</td><td class="num">${f(totBase)}</td><td class="num">${f(totIva)}</td><td class="num">${f(totTotal)}</td><td></td></tr></tfoot>
    </table>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Pagado a fecha: ${f(totPaid)} · Pendiente de pago: ${f(totPend)}</div>

    <h2 class="sec">Notas</h2>
    <ul class="note-list">${notes}</ul>

    <div class="doc-foot">
      <span>Legion Club · Caro Legión S.L. · Carrer Ensija 32, Sant Fruitós de Bages</span>
      <span>Documento generado el ${today()}</span>
    </div>
  `;
}

loadData();
render();
</script>
</body>
</html>
