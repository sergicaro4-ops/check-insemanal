  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    --bg:#09090f; --bg2:#111118; --bg3:#16161f;
    --border:rgba(255,255,255,0.08); --bb:rgba(255,255,255,0.16);
    --text:#f0f0f8; --muted:#8888aa; --dim:#55556a;

    --gold:#d4a838; --green:#10b981; --amber:#f59e0b; --red:#ef4444;
    --radius:16px; --rsm:10px;
  }
  body { font-family:'Inter',sans-serif; background:
    radial-gradient(1100px 560px at 80% -10%, rgba(99,102,241,0.10), transparent),
    radial-gradient(800px 460px at -10% 8%, rgba(16,185,129,0.07), transparent), var(--bg);
    color:var(--text); min-height:100vh; }

  /* HEADER + TABS */
  .top { position:sticky; top:0; z-index:50; background:rgba(9,9,15,0.88); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
  .top-inner { max-width:1040px; margin:0 auto; padding:14px 18px 0; }
  .brand { display:flex; align-items:center; gap:10px; font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:0.14em; font-size:15px; margin-bottom:12px; }
  .brand .dot { width:9px; height:9px; border-radius:50%; background:var(--gold); box-shadow:0 0 12px var(--gold); }
  .tabs { display:flex; gap:4px; overflow-x:auto; }
  .tab-btn { flex-shrink:0; font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; padding:11px 16px; border:none; background:none; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--text); border-bottom-color:var(--gold); }

  main { max-width:1040px; margin:0 auto; padding:24px 18px 80px; }
  .tab { display:none; animation:fade .3s ease; }
  .tab.active { display:block; }
  @keyframes fade { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }

  h1 { font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700; margin-bottom:4px; }
  .sub { color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.55; }
  h3.bt { font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:700; margin:24px 0 12px; }

  .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:14px; }
  .label { font-family:'Space Grotesk',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:8px; }
  .grid { display:grid; gap:12px; }
  .g3 { grid-template-columns:repeat(3,1fr); } .g4 { grid-template-columns:repeat(4,1fr); }
  @media (max-width:720px){ .g3,.g4{ grid-template-columns:repeat(2,1fr); } }

  .num-in { background:var(--bg3); border:1px solid var(--border); border-radius:var(--rsm); padding:11px 13px; font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--text); outline:none; width:100%; -moz-appearance:textfield; font-size:18px; }
  .num-in:focus { border-color:var(--c4); box-shadow:0 0 0 3px color-mix(in srgb,var(--c4) 15%,transparent); }
  .num-in::-webkit-outer-spin-button,.num-in::-webkit-inner-spin-button{-webkit-appearance:none;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .hint { font-size:11px; color:var(--dim); margin-top:6px; }

  .kpi { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .kpi .l { font-family:'Space Grotesk',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .kpi .v { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; }

  .btn { font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; padding:10px 16px; border-radius:var(--rsm); border:1px solid var(--bb); background:var(--bg3); color:var(--text); cursor:pointer; }
  .btn.go { background:linear-gradient(135deg,var(--c4),var(--c5)); border:none; }
  .btn.gold { background:linear-gradient(135deg,var(--gold),#f0c860); border:none; color:#1a1405; }
  .btn:hover { filter:brightness(1.08); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-family:'Space Grotesk',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--dim); padding:10px; border-bottom:1px solid var(--bb); white-space:nowrap; }
  th.n,td.n { text-align:right; font-family:'Space Grotesk',sans-serif; }
  td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .tbl-wrap { overflow-x:auto; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
  table.min { min-width:680px; }
  .rsel,.rnum { background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:12px; padding:6px 8px; outline:none; }
  .rnum { font-family:'Space Grotesk',sans-serif; font-weight:600; text-align:right; width:96px; -moz-appearance:textfield; }
  .rnum.iva { width:54px; }
  .note { font-size:11px; color:var(--dim); margin-top:3px; }
  .pill { cursor:pointer; font-family:'Space Grotesk',sans-serif; font-size:11px; font-weight:700; padding:4px 10px; border-radius:14px; border:1px solid; white-space:nowrap; }
  .pill.paid{ color:var(--green); border-color:color-mix(in srgb,var(--green) 45%,transparent); background:color-mix(in srgb,var(--green) 12%,transparent); }
  .pill.pend{ color:var(--c7); border-color:color-mix(in srgb,var(--c7) 45%,transparent); background:color-mix(in srgb,var(--c7) 12%,transparent); }
  .del { background:none; border:none; color:var(--dim); cursor:pointer; font-size:15px; }
  .del:hover { color:var(--red); }
  .addgrid { display:grid; grid-template-columns:2fr 1.2fr .8fr .7fr .7fr auto; gap:8px; align-items:end; }
  @media (max-width:760px){ .addgrid{ grid-template-columns:1fr 1fr; } }
  .fld label { font-size:10px; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); font-family:'Space Grotesk',sans-serif; font-weight:600; display:block; margin-bottom:5px; }
  .fld input,.fld select { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--rsm); padding:10px; color:var(--text); font-size:13px; outline:none; }

  .bars .row { display:grid; grid-template-columns:160px 1fr 110px; gap:10px; align-items:center; margin-bottom:8px; font-size:13px; }
  @media (max-width:600px){ .bars .row{ grid-template-columns:110px 1fr 88px; } }
  .track { height:13px; background:var(--bg3); border-radius:7px; overflow:hidden; border:1px solid var(--border); }
  .fill { height:100%; border-radius:7px; }
  .bamt { text-align:right; font-family:'Space Grotesk',sans-serif; font-weight:700; }
  .bamt small { color:var(--dim); font-weight:400; }

  .verdict { border-radius:var(--radius); padding:20px; margin-bottom:16px; border:1px solid; }
  .verdict.ok{ background:color-mix(in srgb,var(--green) 12%,var(--bg2)); border-color:color-mix(in srgb,var(--green) 35%,transparent);}
  .verdict.warn{ background:color-mix(in srgb,var(--amber) 12%,var(--bg2)); border-color:color-mix(in srgb,var(--amber) 35%,transparent);}
  .verdict.bad{ background:color-mix(in srgb,var(--red) 12%,var(--bg2)); border-color:color-mix(in srgb,var(--red) 35%,transparent);}
  .verdict .vt { font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .verdict .vh { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; margin-bottom:6px; }
  .verdict.ok .vh{color:#6ee7b7;} .verdict.warn .vh{color:#fcd34d;} .verdict.bad .vh{color:#fca5a5;}
  .verdict p { font-size:13px; color:var(--muted); line-height:1.55; }

  .tag { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:14px; background:var(--bg3); border:1px solid var(--bb); color:var(--muted); }
  .disc { font-size:11.5px; color:var(--dim); background:var(--bg2); border:1px solid var(--border); border-radius:var(--rsm); padding:12px 14px; line-height:1.5; }

  @media print {
    .top{ display:none; } .tab{ display:none !important; } .tab.printing{ display:block !important; }
    body{ background:#fff; color:#000; } .card,.kpi,.verdict,.tbl-wrap,.disc{ background:#fff; border-color:#ccc; }
    main{ padding:0; }

</style>

// ══════════ ESTADO ══════════
const RK='gym_reforma_v2', BK='gym_banco_v1';
const SALDO_DEF=63245.73, APORTADO=290000, POR_APORTAR=0;
let R={budget:290000,usdRate:0.92,ivaDefault:21,items:[]};
let B={saldo:SALDO_DEF,mov:[]};
let filterR='all', filterB='all';

function load(){
  try{ const raw=localStorage.getItem(RK); if(raw){ const o=JSON.parse(raw); R={budget:(typeof o.budget==='number'?o.budget:290000),usdRate:o.usdRate||0.92,ivaDefault:o.ivaDefault||21,items:Array.isArray(o.items)?o.items:[]}; } }catch(e){}
  if(!R.items.length) R.items=seedItems();
  R.items.forEach(i=>{ if(!i.id) i.id=uid(); });
  // Migración puntual: el 40% de Carulla pasa a llevar IVA (antes 0%).
  const cs=R.items.find(i=>i.sk==='carulla-pend-siniva');
  if(cs && cs.iva===0 && !localStorage.getItem('migCarullaIva')){ cs.iva=21; cs.concepto='Carulla Energía — pendiente 40% (con IVA)'; cs.nota='40% final con IVA'; localStorage.setItem('migCarullaIva','1'); saveR(); }
  // Migración puntual: los fundadores no aportan más → capital disponible = 290.000 €.
  if(R.budget===430000 && !localStorage.getItem('migNoMasCapital')){ R.budget=290000; localStorage.setItem('migNoMasCapital','1'); saveR(); }
  // Migración puntual: dividir Patrick eléctrica y Maquinaria en pagado/pendiente.
  if(!localStorage.getItem('migSplitPagos')){
    R.items=R.items.filter(i=>!['elec-gimnas','maq-hse'].includes(i.sk));
    const nous=seedItems().filter(i=>['maq-pagado','maq-pend','elec-gimnas-pagado','elec-gimnas-pend'].includes(i.sk));
    if(!R.items.some(i=>i.sk==='maq-pagado')) R.items.push(...nous);
    localStorage.setItem('migSplitPagos','1'); saveR();
  }
  // Migración puntual: precios dados a mano eran CON IVA → pasar a base = importe/1,21.
  if(!localStorage.getItem('migIvaIncl')){
    const b={'pulir-suelo':14049.59,'tornos':7438.02,'pintura-gral':4132.23,'accesibilidad':9917.36,'lm-pendiente':11570.25,'puerta-qr':6611.57,'imprevistos':20661.16};
    Object.entries(b).forEach(([sk,v])=>{const it=R.items.find(i=>i.sk===sk);if(it)it.base=v;});
    localStorage.setItem('migIvaIncl','1'); saveR();
  }
  // Migración puntual: colchón de imprevistos / partidas por definir.
  if(!localStorage.getItem('migImprev')){
    if(!R.items.some(i=>i.sk==='imprevistos')) R.items.push(...seedItems().filter(i=>i.sk==='imprevistos'));
    localStorage.setItem('migImprev','1'); saveR();
  }
  // Migración puntual: quitar vidrios recepción (Franquet Barrau).
  if(!localStorage.getItem('migVidres')){
    R.items=R.items.filter(i=>i.sk!=='vidres-recep');
    localStorage.setItem('migVidres','1'); saveR();
  }
  // Migración puntual: pintura total 5.000 € (el suelo va acabado).
  if(!localStorage.getItem('migPintura')){
    R.items=R.items.filter(i=>i.sk!=='pintura-fachada');
    const p=R.items.find(i=>i.sk==='pintura-gral'); if(p){p.base=5000;p.concepto='Pintura (paredes + fachada)';p.nota='El suelo va acabado, no se pinta';}
    localStorage.setItem('migPintura','1'); saveR();
  }
  // Migración puntual: presupuestos concretos (suelo, torno, Luis Miguel, elevador).
  if(!localStorage.getItem('migPresu2')){
    const upd={'pulir-suelo':{base:17000,concepto:'Suelo (pavimento gimnasio)',nota:'Presupuesto'},'tornos':{base:9000,nota:'Presupuesto'},'accesibilidad':{base:12000,concepto:'Elevador para minusválidos',nota:'≈ 12.000 € (orientativo)'},'lm-pendiente':{base:14000,concepto:'Luis Miguel (techo vestuarios + paredes)',nota:'Techo vestuarios c/ mano de obra 9.000 + pared separatoria 3.000 + pared frontal 2.000'}};
    Object.entries(upd).forEach(([sk,v])=>{const it=R.items.find(i=>i.sk===sk);if(it)Object.assign(it,v);});
    localStorage.setItem('migPresu2','1'); saveR();
  }
  // Migración puntual: quitar duplicado de Carulla (las 4 ofertas eran Carulla).
  if(!localStorage.getItem('migDupCarulla')){
    R.items=R.items.filter(i=>!['clima-991','agua-994','acs-992','rite-995'].includes(i.sk));
    ['carulla-pagado','carulla-pend-iva','carulla-pend-siniva'].forEach(sk=>{const it=R.items.find(i=>i.sk===sk);if(it)it.categoria='clima';});
    localStorage.setItem('migDupCarulla','1'); saveR();
  }
  // Migración puntual: afegir despeses reals d'obra ja pagades (no pressupostades).
  if(!localStorage.getItem('migExtraObra')){
    const ex=seedItems().filter(i=>i.sk.startsWith('extra-'));
    ex.forEach(e=>{ if(!R.items.some(i=>i.sk===e.sk)) R.items.push(e); });
    localStorage.setItem('migExtraObra','1'); saveR();
  }
  try{ const raw=localStorage.getItem(BK); if(raw){ const o=JSON.parse(raw); B={saldo:typeof o.saldo==='number'?o.saldo:SALDO_DEF,mov:Array.isArray(o.mov)?o.mov:[]}; } }catch(e){}
  if(!B.mov.length) B.mov=seedMov();
}
function saveR(){ localStorage.setItem(RK,JSON.stringify({budget:R.budget,usdRate:R.usdRate,ivaDefault:R.ivaDefault,items:R.items})); }
function saveB(){ localStorage.setItem(BK,JSON.stringify(B)); }

// ══════════ HELPERS ══════════
const f=n=>(n<0?'-':'')+Math.abs(Math.round(n)).toLocaleString('es-ES')+' €';
const fs=n=>(n>0?'+':n<0?'-':'')+Math.abs(Math.round(n)).toLocaleString('es-ES')+' €';
const fcur=(n,c)=>Math.round(n).toLocaleString('es-ES')+(c==='USD'?' $':' €');
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const baseEUR=i=>i.currency==='USD'?(i.base||0)*R.usdRate:(i.base||0);
const ivaEUR=i=>baseEUR(i)*(i.iva||0)/100;
const totEUR=i=>baseEUR(i)*(1+(i.iva||0)/100);
function totalsR(){ let base=0,iva=0,tot=0,paid=0,pend=0; R.items.forEach(i=>{base+=baseEUR(i);iva+=ivaEUR(i);const t=totEUR(i);tot+=t;if(i.estado==='paid')paid+=t;else pend+=t;}); return {base,iva,tot,paid,pend}; }

function showTab(name){
  document.querySelectorAll('.tab').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.getElementById('t-'+name).classList.add('active');
  ({presupuesto:renderPresupuesto,banco:renderBanco,resumen:renderResumen,socios:renderSocios,dossier:renderDossier}[name])();
}
document.getElementById('tabs').addEventListener('click',e=>{ const b=e.target.closest('.tab-btn'); if(b) showTab(b.dataset.tab); });

function setBudget(v){ R.budget=parseFloat(v)||0; saveR(); }

function setIva(v){ R.ivaDefault=parseFloat(v)||0; saveR(); }

function chg(id,field,val){ const i=R.items.find(x=>x.id===id); if(!i)return; if(field==='base'||field==='iva'){const n=parseFloat(val);i[field]=isNaN(n)?0:n;}else i[field]=val; saveR(); renderPresupuesto(); }
function tog(id){ const i=R.items.find(x=>x.id===id); if(i){i.estado=i.estado==='paid'?'pending':'paid';saveR();renderPresupuesto();} }
function rm(id){ R.items=R.items.filter(x=>x.id!==id); saveR(); renderPresupuesto(); }
function add(){ const c=document.getElementById('aC').value.trim(); const b=parseFloat(document.getElementById('aB').value); if(!c||isNaN(b)){alert('Pon concepto e importe');return;} let iva=parseFloat(document.getElementById('aI').value); if(isNaN(iva))iva=R.ivaDefault; R.items.unshift({id:uid(),sk:'',concepto:c,categoria:document.getElementById('aCat').value,base:b,currency:document.getElementById('aM').value,iva,estado:'pending',nota:''}); saveR(); renderPresupuesto(); }

// ══════════ TAB: RESUMEN ══════════
function renderResumen(){
  const t=totalsR(), aportado=APORTADO;
  const falta=Math.max(0,t.tot-aportado), need=falta>0;
  const est=R.items.filter(i=>/ESTIMACI/i.test(i.nota||'')&&baseEUR(i)>0);
  const totEst=est.reduce((s,i)=>s+totEUR(i),0);
  let vc,vh,vm;
  if(need){vc='bad';vh=`Faltan ${f(falta)} por captar de inversores`;vm=`Los fundadores han aportado ${f(aportado)} y no van a aportar más. El proyecto cuesta ${f(t.tot)}, por lo que faltan ${f(falta)} que deben venir de socios nuevos.${est.length?` Incluye ${f(totEst)} en estimaciones aún sin cerrar.`:''}`;}
  else {vc='ok';vh='Proyecto cubierto';vm=`Lo aportado por los fundadores (${f(aportado)}) cubre el coste total (${f(t.tot)}).`;}
  const byCat={}; R.items.forEach(i=>byCat[i.categoria]=(byCat[i.categoria]||0)+totEUR(i));
  const used=CATEGORIES.filter(c=>byCat[c.key]>0).sort((a,b)=>byCat[b.key]-byCat[a.key]);
  const mx=Math.max(1,...used.map(c=>byCat[c.key]));
  const bars=used.map(c=>`<div class="row"><div>${c.icon} ${c.label}</div><div class="track"><div class="fill" style="width:${byCat[c.key]/mx*100}%;background:${c.color}"></div></div><div class="bamt">${f(byCat[c.key])} <small>${Math.round(byCat[c.key]/t.tot*100)}%</small></div></div>`).join('');
  const special=R.items.filter(i=>(i.iva||0)!==21&&baseEUR(i)>0);
  let notes='';
  if(special.length) notes+=`<li><b>IVA distinto del 21%:</b> ${special.map(i=>`${esc(i.concepto)} (${(i.iva||0)===0?'sin IVA':String(i.iva).replace('.',',')+'%'})`).join('; ')}.</li>`;
  if(est.length) notes+=`<li><b>Estimaciones</b> (sin presupuesto firme) por ${f(totEst)}: ${est.map(i=>esc(i.concepto)).join('; ')}.</li>`;
  document.getElementById('t-resumen').innerHTML=`
    <h1>Resumen para socios</h1>
    <p class="sub">Estado de la inversión, necesidad de capital y desglose con base/IVA/total. <button class="btn" onclick="printTab('resumen')" style="margin-left:8px">🖨️ Imprimir / PDF</button></p>
    <div class="verdict ${vc}"><div class="vt">¿Se necesita capital externo?</div><div class="vh">${need?'🔴':'🟢'} ${vh}</div><p>${vm}</p>
      <div class="grid g3" style="margin-top:14px">
        <div class="kpi"><div class="l">Coste total</div><div class="v">${f(t.tot)}</div></div>
        <div class="kpi"><div class="l">Aportado fundadores</div><div class="v">${f(aportado)}</div></div>
        <div class="kpi"><div class="l">Falta por captar</div><div class="v" style="color:${need?'var(--red)':'var(--c4)'}">${f(falta)}</div></div>
      </div>
    </div>
    <div class="grid g3">
      <div class="kpi"><div class="l">Base sin IVA</div><div class="v" style="color:var(--c2)">${f(t.base)}</div></div>
      <div class="kpi"><div class="l">IVA</div><div class="v" style="color:var(--c3)">${f(t.iva)}</div></div>
      <div class="kpi"><div class="l">Total con IVA</div><div class="v" style="color:var(--c4)">${f(t.tot)}</div></div>
    </div>
    <h3 class="bt">📊 Distribución por categoría</h3>
    <div class="card bars">${bars}</div>
    ${notes?`<h3 class="bt">🧾 Notas</h3><div class="card"><ul style="padding-left:18px;color:var(--muted);font-size:13px;line-height:1.7">${notes}</ul></div>`:''}`;
}

// ══════════ TAB: SOCIOS ══════════
let SO={valoracion:500000,aportacion:50000,extraFund:190000,carullaSinIva:true,aplazarCarulla:true};
function renderSocios(){
  const t=totalsR();
  const saldo=B.saldo;
  const ahorro=SO.carullaSinIva?7929.77:0;            // Carulla 40% sin IVA
  const pend=Math.max(0,t.pend-ahorro);
  const aportFund=SO.extraFund||0;
  const deficit=Math.max(0, pend - saldo - aportFund); // lo que falta de fuera
  const carullaTot=114226.48-ahorro;                   // total Carulla
  const aplazado=SO.aplazarCarulla?Math.min(deficit,carullaTot*0.25):0; // 25% a 60 días
  const faltaAhora=Math.max(0,deficit-aplazado);
  const V=SO.valoracion,P=SO.aportacion;
  const pps=V>0?P/V:0;
  const n=(P>0&&deficit>0)?Math.ceil(deficit/P):0;
  const cap=n*P, pv=V>0?cap/V:0, pf=1-pv, pcf=pf/5, may=pf>0.5;
  let cls,tit,msg;
  if(deficit<=0){cls='ok';tit='¡Cubierto! No hace falta capital externo';msg=`Con el saldo del banco (${f(saldo)}) y las aportaciones de fundadores (${f(aportFund)}) cubrís lo pendiente (${f(pend)}). No necesitáis vender participaciones.`;}
  else if(!may){cls='bad';tit='Cubriríais, pero perdéis la mayoría';msg=`Para reunir ${f(deficit)} de fuera hay que vender ${(pv*100).toFixed(0)}%. Los 5 fundadores bajarían a ${(pcf*100).toFixed(1)}% cada uno. Sube la valoración, mete deuda o más aportación de fundadores.`;}
  else {cls=pv>0.35?'warn':'ok';tit=`Faltan ${f(deficit)} → ${n} socio(s) externo(s)`;msg=`Tras saldo + aportaciones de fundadores, quedan ${f(deficit)} por conseguir. Con ${n} socio(s) de ${f(P)} lo cubrís, conservando ${(pf*100).toFixed(0)}% entre los fundadores (${(pcf*100).toFixed(1)}% cada uno).`;}
  let ct='';
  for(let i=1;i<=5;i++) ct+=`<div class="row"><div>Fundador ${i}</div><div class="track"><div class="fill" style="width:${pcf*100}%;background:#6366f1"></div></div><div class="bamt">${(pcf*100).toFixed(1)}%</div></div>`;
  for(let i=1;i<=n;i++) ct+=`<div class="row"><div>Socio nuevo ${i}</div><div class="track"><div class="fill" style="width:${pps*100}%;background:#8b5cf6"></div></div><div class="bamt">${(pps*100).toFixed(1)}%</div></div>`;
  const vals=[400000,500000,600000,750000,1000000];
  const comp=vals.map(v=>{const fund=(1-n*(P/v))/5;const mj=(1-n*(P/v))>0.5;return `<tr style="${v===V?'background:color-mix(in srgb,var(--c2) 10%,transparent)':''}"><td>${f(v)}</td><td class="n">${(deficit/v*100).toFixed(0)}%</td><td class="n">${(Math.max(0,fund)*100).toFixed(1)}%</td><td style="color:${mj?'var(--c4)':'var(--red)'};font-weight:700">${mj?'Sí':'No'}</td></tr>`;}).join('');
  document.getElementById('t-socios').innerHTML=`
    <h1>Plan de financiación</h1>
    <p class="sub">Cuánto falta tras el saldo del banco y las aportaciones de los fundadores, y cómo cubrir el resto con socios externos.</p>
    <div class="disc" style="margin-bottom:16px">⚠️ Orientación, no asesoramiento. La ampliación de capital y el leasing de la nave (operación vinculada) los formaliza un asesor.</div>
    <div class="grid g4">
      <div class="kpi"><div class="l">⏳ Pendiente de pagar</div><div class="v">${f(pend)}</div></div>
      <div class="card" style="margin:0"><span class="label">🏦 Saldo en banco</span><input class="num-in" type="number" step="1000" value="${saldo}" oninput="setSaldoSoc(this.value)"></div>
      <div class="card" style="margin:0"><span class="label">👨‍👩‍👦 Aportan fundadores</span><input class="num-in" type="number" step="5000" value="${aportFund}" oninput="setSO('extraFund',this.value)"><div class="hint">Óscar 100k + Arnau 40k + Antonio&Marta 50k</div></div>
      <div class="kpi"><div class="l">🔴 Falta conseguir</div><div class="v" style="color:${deficit>0?'var(--red)':'var(--c4)'}">${f(deficit)}</div>${aplazado>0?`<div class="hint" style="color:var(--c5)">${f(faltaAhora)} ahora · ${f(aplazado)} en 60 días</div>`:''}</div>
    </div>
    <div style="margin:6px 0 18px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="toggleCarulla()" style="${SO.carullaSinIva?'border-color:var(--c4);color:var(--c4)':''}">${SO.carullaSinIva?'✓ ':''}Carulla 40% sin IVA ${SO.carullaSinIva?'(−7.930 €)':''}</button>
      <button class="btn" onclick="toggleAplazar()" style="${SO.aplazarCarulla?'border-color:var(--c5);color:var(--c5)':''}">${SO.aplazarCarulla?'✓ ':''}Aplazar 25% Carulla a 60 días</button>
    </div>
    ${aplazado>0?`<div class="verdict ok" style="margin-bottom:16px"><div class="vh">🕐 Solo ${f(faltaAhora)} de forma inmediata</div><p>Aplazando el 25% de Carulla (${f(aplazado)}) a 60 días, ahora mismo solo necesitas cubrir <b>${f(faltaAhora)}</b>. El resto (${f(aplazado)}) lo pagas en 2 meses, cuando ya entran cuotas de socios y las aportaciones.</p></div>`:''}
    <div class="verdict ${cls}"><div class="vh">${deficit<=0?'✅':'⚠️'} ${tit}</div><p>${msg}</p></div>
    ${deficit>0?`
    <h3 class="bt">Cubrir el resto con socios externos</h3>
    <div class="grid g3">
      <div class="card"><span class="label">Valoración (post-money)</span><input class="num-in" type="number" step="10000" value="${V}" oninput="setSO('valoracion',this.value)"></div>
      <div class="card"><span class="label">Aportación por socio</span><input class="num-in" type="number" step="5000" value="${P}" oninput="setSO('aportacion',this.value)"><div class="hint">Cada socio compra ${(pps*100).toFixed(1)}% por ${f(P)}.</div></div>
      <div class="kpi"><div class="l">% vendido / socios</div><div class="v">${(pv*100).toFixed(0)}% · ${n}</div></div>
    </div>
    <h3 class="bt">Reparto resultante (cap table)</h3>
    <div class="card bars">${ct}</div>
    <h3 class="bt">¿Y si cambias la valoración?</h3>
    <div class="tbl-wrap"><table><thead><tr><th>Valoración</th><th class="n">% a vender</th><th class="n">Fundadores c/u</th><th>¿Mayoría?</th></tr></thead><tbody>${comp}</tbody></table></div>`:''}`;
}
function setSO(k,v){ SO[k]=parseFloat(v)||0; renderSocios(); }
function setSaldoSoc(v){ B.saldo=parseFloat(v)||0; saveB(); renderSocios(); }
function toggleCarulla(){ SO.carullaSinIva=!SO.carullaSinIva; renderSocios(); }
function toggleAplazar(){ SO.aplazarCarulla=!SO.aplazarCarulla; renderSocios(); }

// ══════════ TAB: DOSSIER ══════════
let DO={cuota:50,socios:800,alquiler:2600,preinscritos:220,cuotaPre:40};

      <div class="kpi"><div class="l">EBITDA objetivo año 3</div><div class="v">${f(eb3)}</div></div>
      <div class="kpi"><div class="l">Aportado fundadores</div><div class="v">${f(APORTADO)}</div></div>
    </div>
    <h3 class="bt">Tesis de valoración (500.000 € es lo que vale, no lo invertido)</h3>
    <div class="card">
      <div class="bars">
        <div class="row"><div>Coste de reposición</div><div class="track"><div class="fill" style="width:${Math.min(100,coste/1140000*100)}%;background:var(--gold)"></div></div><div class="bamt">${f(coste)}</div></div>
        <div class="row"><div>EBITDA × 3–5</div><div class="track"><div class="fill" style="width:100%;background:var(--gold)"></div></div><div class="bamt">${f(eb3*3)}–${f(eb3*5)}</div></div>
        <div class="row"><div>Ingresos × 1,3</div><div class="track"><div class="fill" style="width:${Math.min(100,ing3*1.3/1140000*100)}%;background:var(--gold)"></div></div><div class="bamt">${f(ing3*1.3)}</div></div>
      </div>
      <p class="note" style="margin-top:8px">Los tres métodos respaldan una valoración de 500.000 € (conservadora).</p>
    </div>
    <h3 class="bt">Proyección financiera</h3>
    <div class="grid g3" style="margin-bottom:8px">
      <div class="card"><span class="label">Socios objetivo</span><input class="num-in" type="number" step="50" value="${socios}" oninput="setDO('socios',this.value)"></div>
      <div class="card"><span class="label">Cuota regular €</span><input class="num-in" type="number" value="${cuota}" oninput="setDO('cuota',this.value)"></div>
      <div class="card"><span class="label">Preinscritos / cuota €</span><div style="display:flex;gap:8px"><input class="num-in" type="number" value="${preinscritos}" oninput="setDO('preinscritos',this.value)"><input class="num-in" type="number" value="${cuotaPre}" oninput="setDO('cuotaPre',this.value)"></div></div>
    </div>
    <div class="tbl-wrap"><table><thead><tr><th>Concepto</th><th class="n">Año 1</th><th class="n">Año 2</th><th class="n">Año 3</th></tr></thead><tbody>
      <tr><td>Socios activos</td>${rows.map(r=>`<td class="n">${r.s}</td>`).join('')}</tr>
      <tr><td>Ingresos</td>${rows.map(r=>`<td class="n">${f(r.ing)}</td>`).join('')}</tr>
      <tr><td style="color:var(--gold)"><b>EBITDA</b></td>${rows.map(r=>`<td class="n"><b>${f(r.eb)}</b></td>`).join('')}</tr>
    </tbody></table></div>
    <p class="note" style="margin-top:8px">220 preinscritos a cuota reducida; resto a regular. Rampa 50/75/100%. Otros costes 25% de ingresos. Cifras ilustrativas.</p>
    <h3 class="bt">Retorno del inversor (10%)</h3>
    <div class="grid g3">
      <div class="kpi"><div class="l">Beneficio anual (año 3)</div><div class="v" style="color:var(--c4)">${f(ben)}</div></div>

    </div>
    <h3 class="bt">👥 Equipo y solidez</h3>
    <div class="card"><p style="font-size:14px;color:var(--muted);line-height:1.7">Sociedad familiar de <b style="color:var(--text)">5 socios</b>: cuatro son <b style="color:var(--text)">dentistas</b> —respaldo financiero sólido y estable— y el administrador, <b style="color:var(--text)">Sergi Caro</b>, es graduado en <b style="color:var(--text)">ADE</b> y culturista: formación en gestión empresarial y conocimiento profundo del sector fitness.</p></div>

        <li>Con <b style="color:var(--text)">300 socios</b> se cubre además la devolución del préstamo de socios.</li>
        <li>El objetivo de 800 socios es solo el <b style="color:var(--text)">0,6%</b> del mercado de la zona: amplio recorrido.</li>

    </div>

    <h3 class="bt">💶 Estructura financiera y reparto</h3>

    </ul></div>

    <h3 class="bt">🤝 Cómo comprar participaciones</h3>
    <div class="card">
      <div class="grid g3" style="margin-bottom:12px">
        <div class="kpi"><div class="l">Ticket de entrada</div><div class="v" style="color:var(--gold)">50.000 €</div></div>
        <div class="kpi"><div class="l">Participación</div><div class="v">10%</div></div>
        <div class="kpi"><div class="l">Valoración</div><div class="v">500.000 €</div></div>
      </div>
      <ul style="padding-left:18px;color:var(--muted);font-size:13px;line-height:1.8">
        <li>Entras como socio mediante <b style="color:var(--text)">ampliación de capital</b> (participaciones nuevas de Caro Legión S.L.).</li>
        <li>Obtienes el <b style="color:var(--text)">10% de la propiedad</b>, con derecho a voto y a participar en los beneficios (dividendos) de forma proporcional.</li>
        <li>Posibilidad de adquirir <b style="color:var(--text)">varios tramos del 10%</b>.</li>
        <li>Operación formalizada ante notario con <b style="color:var(--text)">pacto de socios</b> (cláusulas de salida y derecho de acompañamiento).</li>
      </ul>
    </div>
    <div class="disc" style="margin-top:18px"><b>Aviso legal.</b> Documento comercial informativo, no es oferta de valores ni asesoramiento. Las proyecciones son estimaciones, no garantías. Toda inversión requiere due diligence y pacto de socios ante asesor.</div>`;
}
function setDO(k,v){ DO[k]=parseFloat(v)||0; renderDossier(); }

function printTab(name){
  document.querySelectorAll('.tab').forEach(s=>s.classList.remove('printing'));
  document.getElementById('t-'+name).classList.add('printing');
  window.print();
  setTimeout(()=>document.getElementById('t-'+name).classList.remove('printing'),500);
}
